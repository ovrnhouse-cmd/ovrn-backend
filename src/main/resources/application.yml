spring:
  application:
    name: wolf-ovrn-backend

  datasource:
    url: ${DATABASE_URL}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
             # - openid
              - email
              - profile

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}
  frontend:
    redirect-url: ${FRONTEND_REDIRECT_URL:http://localhost:3000/}
  cookie:
    secure: ${COOKIE_SECURE:false}
    domain: ${COOKIE_DOMAIN:}
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:3000}
  razorpay:
    key-id: ${RAZORPAY_KEY_ID}
    key-secret: ${RAZORPAY_KEY_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG           # shows SQL queries — set to WARN to mute completely
    org.hibernate.orm.jdbc.bind: TRACE # shows bound query params alongside SQL
    org.hibernate.transaction: WARN
    org.springframework.transaction: WARN
    org.springframework.web: WARN
    jakarta.validation: WARN


---
# ─────────────────────────────────────────────────────────────────────────────
# Production profile — activated with: SPRING_PROFILES_ACTIVE=prod
#
# Environment variables you MUST set on the server / Docker / Railway:
#
#   COOKIE_SECURE=true
#   COOKIE_DOMAIN=.ovrn.in          ← leading dot = covers ovrn.in AND api.ovrn.in
#   CORS_ALLOWED_ORIGIN=https://ovrn.in
#   FRONTEND_REDIRECT_URL=https://ovrn.in/
#   COOKIE_SAMESITE=Lax             ← same registrable domain → Lax is fine
#
# ─────────────────────────────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false

logging:
  level:
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.springframework.web: WARN
    org.hibernate.transaction: WARN
    org.springframework.transaction: WARN
    jakarta.validation: WARN
